services:
  zola:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    # Your secrets and AI provider keys. Copy .env.example to .env.local first —
    # compose fails fast if it's missing, which is better than the app booting
    # without an ENCRYPTION_KEY.
    env_file:
      - .env.local
    # These override anything in .env.local: inside the compose network the
    # services are reachable by service name, not localhost.
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgres://zola:zola@postgres:5432/zola
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=zola
      - MINIO_SECRET_KEY=zola-minio-secret
      - MINIO_BUCKET=chat-attachments
      # Browser-facing, so it must NOT be the internal hostname. Override to
      # your real domain in production.
      - MINIO_PUBLIC_URL=http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Creates/updates the schema, then exits. The app waits for this to succeed,
  # so a fresh `docker compose up` needs no manual migration step. Re-runs on
  # every up and is a no-op when the schema is already current.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      - DATABASE_URL=postgres://zola:zola@postgres:5432/zola
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=zola
      - POSTGRES_PASSWORD=zola
      - POSTGRES_DB=zola
    volumes:
      - zola-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zola -d zola"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=zola
      - MINIO_ROOT_PASSWORD=zola-minio-secret
    volumes:
      - zola-minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  zola-postgres-data:
  zola-minio-data:
